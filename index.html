<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Incoming Deposit</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family: Arial, Helvetica, sans-serif;
        background:#f5f7fa;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        color:#1f2937;
    }

    .container{
        background:#ffffff;
        padding:40px 30px;
        border-radius:16px;
        box-shadow:0 4px 20px rgba(0,0,0,0.08);
        text-align:center;
        width:90%;
        max-width:450px;
    }

    h1{
        font-size:32px;
        font-weight:800;
        margin-bottom:20px;
        color:#111827;
        letter-spacing:0.5px;
    }

    .status{
        font-size:24px;
        font-weight:700;
        color:#f59e0b;
        margin-bottom:15px;
    }

    .description{
        font-size:16px;
        color:#6b7280;
        line-height:1.6;
        margin-bottom:25px;
    }

    .badge{
        display:inline-block;
        background:#dbeafe;
        color:#1d4ed8;
        padding:10px 18px;
        border-radius:25px;
        font-weight:700;
        font-size:14px;
    }

    .loader{
        width:50px;
        height:50px;
        border:5px solid #e5e7eb;
        border-top:5px solid #1d4ed8;
        border-radius:50%;
        animation:spin 1s linear infinite;
        margin:25px auto;
    }

    @keyframes spin{
        100%{
            transform:rotate(360deg);
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>🌍 TRACK INCOMING DEPOSIT</h1>

    <div class="status">Pending Transaction</div>

    <div class="loader"></div>

    <p class="description">
        Your deposit has been detected and is currently awaiting network confirmation. The transaction will be credited automatically once confirmation is complete.
    </p>

    <div class="badge">
        ⏳ A network fee of £800 is required before this transaction can be processed.
    </div>
</div>

</body>
</html>
